<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Stimulus</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-chat-ink: #0f172a;
        --color-chat-panel: #ffffff;
        --color-chat-soft: #e2e8f0;
        --color-chat-muted: #64748b;
        --color-chat-accent: #2563eb;
        --color-chat-accent-dark: #1d4ed8;
        --color-chat-peer: #e2e8f0;
        --color-chat-bg: #f8fafc;
      }
    </style>
  </head>
  <body class="h-screen overflow-hidden bg-chat-bg text-chat-ink">
    <main
      data-controller="chat"
      data-chat-api-url-value="http://localhost:3000"
      data-chat-ws-url-value="ws://localhost:3000/cable"
      data-chat-room-id-value="1"
      class="mx-auto flex h-screen w-full max-w-6xl px-4 py-4 sm:px-6 sm:py-6 lg:px-8 lg:py-8"
    >
      <section class="grid h-full min-h-0 w-full gap-6 lg:grid-cols-[320px_minmax(0,1fr)]">
        <aside
          class="overflow-hidden rounded-[2rem] border border-slate-200 bg-linear-to-br from-slate-950 via-slate-900 to-blue-900 p-6 text-slate-100 shadow-2xl shadow-slate-300/40"
        >
          <p class="text-xs font-semibold uppercase tracking-[0.3em] text-blue-200">Stimulus + Cable</p>
          <h1 class="mt-4 text-3xl font-semibold tracking-tight">Chat Room</h1>
          <p class="mt-3 max-w-xs text-sm leading-6 text-slate-300">
            Historico inicial via HTTP, atualizacao em tempo real por Action Cable e interface
            standalone no browser.
          </p>

          <div class="mt-8 space-y-5">
            <label class="block">
              <span class="mb-2 block text-sm font-medium text-slate-200">Entrar como</span>
              <select
                data-chat-target="emailSelect"
                data-action="change->chat#changeIdentity"
                class="w-full rounded-2xl border border-white/10 bg-white/10 px-4 py-3 text-sm text-white outline-none transition focus:border-blue-300 focus:bg-white/20"
              >
                <option value="sender@example.com" data-peer="receiver@example.com" class="text-slate-900">
                  Sender (sender@example.com)
                </option>
                <option value="receiver@example.com" data-peer="sender@example.com" class="text-slate-900">
                  Receiver (receiver@example.com)
                </option>
              </select>
            </label>

            <div class="rounded-2xl border border-white/10 bg-white/10 p-4">
              <p class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-300">Conexao</p>
              <strong
                data-chat-target="connectionStatus"
                class="mt-2 block text-sm font-medium text-white"
              >
                Disconnected
              </strong>
              <span
                data-chat-target="historyStatus"
                class="mt-2 block text-sm leading-6 text-slate-300"
              >
                Carregando historico...
              </span>
            </div>
          </div>
        </aside>

        <section
          class="flex h-full min-h-0 flex-col overflow-hidden rounded-[2rem] border border-slate-200 bg-chat-panel shadow-[0_30px_80px_rgba(15,23,42,0.08)]"
        >
          <header
            class="border-b border-slate-200 bg-white px-5 py-4 sm:px-6"
          >
            <div class="flex items-center justify-between gap-3">
              <div>
                <p class="text-xs font-semibold uppercase tracking-[0.2em] text-chat-muted">
                  Sala 1
                </p>
                <p class="mt-1 text-lg font-semibold tracking-tight text-slate-900">
                  Conversa ativa
                </p>
              </div>
              <div class="rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-600">
                realtime
              </div>
            </div>
          </header>

          <section
            data-chat-target="messages"
            aria-live="polite"
            aria-label="Messages"
            class="min-h-0 flex-1 overflow-y-auto bg-[radial-gradient(circle_at_top,#eff6ff,transparent_30%),linear-gradient(to_bottom,#ffffff,#f8fafc)] px-4 py-5 sm:px-6"
          ></section>

          <form
            data-action="submit->chat#sendMessage"
            class="border-t border-slate-200 bg-white p-4 sm:p-5"
          >
            <label class="block">
              <span class="mb-2 block text-sm font-medium text-slate-700">Mensagem</span>
              <textarea
                rows="3"
                placeholder="Digite sua mensagem..."
                data-chat-target="input"
                class="w-full resize-none rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-chat-accent focus:bg-white"
              ></textarea>
            </label>

            <div class="mt-4 flex items-center justify-between gap-3">
              <p class="text-xs leading-5 text-slate-500">
                O historico e exibido no carregamento e novas mensagens entram sem refresh.
              </p>
              <button
                type="submit"
                data-chat-target="sendButton"
                class="inline-flex items-center justify-center rounded-full bg-chat-accent px-5 py-3 text-sm font-semibold text-white transition hover:bg-chat-accent-dark disabled:cursor-not-allowed disabled:bg-slate-300"
              >
                Enviar
              </button>
            </div>
          </form>
        </section>
      </section>
    </main>

    <script type="module">
      import { Application, Controller } from "https://unpkg.com/@hotwired/stimulus/dist/stimulus.js"
      import { createConsumer } from "https://esm.sh/@rails/actioncable@8.0.300"

      class ChatController extends Controller {
        static targets = [
          "connectionStatus",
          "emailSelect",
          "historyStatus",
          "input",
          "messages",
          "sendButton",
        ]

        static values = {
          apiUrl: String,
          roomId: Number,
          wsUrl: String,
        }

        connect() {
          this.messages = []
          this.consumer = null
          this.subscription = null
          this.renderMessages()
          this.loadHistory()
          this.connectCable()
        }

        disconnect() {
          this.disconnectCable()
        }

        changeIdentity() {
          this.connectCable()
          this.renderMessages()
        }

        async loadHistory() {
          this.historyStatusTarget.textContent = "Carregando historico..."

          try {
            const response = await fetch(
              `${this.apiUrlValue}/rooms/${this.roomIdValue}/messages`
            )

            if (!response.ok) {
              throw new Error(`Failed to load history: ${response.status}`)
            }

            const data = await response.json()
            this.messages = this.mergeMessages([], data.messages || [])
            this.updateHistoryStatus()
            this.renderMessages()
          } catch (error) {
            console.error(error)
            this.historyStatusTarget.textContent = "Falha ao carregar historico"
          }
        }

        connectCable() {
          this.disconnectCable()
          this.connectionStatusTarget.textContent = "Connecting..."

          this.consumer = createConsumer(`${this.wsUrlValue}?email=${this.currentEmail}`)
          this.subscription = this.consumer.subscriptions.create(
            {
              channel: "TransmissionChannel",
              room_id: this.roomIdValue,
            },
            {
              connected: () => {
                this.connectionStatusTarget.textContent = `Connected as ${this.currentEmail}`
                this.toggleComposer(false)
              },
              disconnected: () => {
                this.connectionStatusTarget.textContent = "Disconnected"
                this.toggleComposer(true)
              },
              received: (data) => {
                if (data.action !== "new_message") return

                this.messages = this.mergeMessages(this.messages, [data.message])
                this.updateHistoryStatus()
                this.renderMessages()
              },
            }
          )
        }

        disconnectCable() {
          if (this.consumer) {
            this.consumer.disconnect()
          }

          this.consumer = null
          this.subscription = null
          this.toggleComposer(true)
        }

        sendMessage(event) {
          event.preventDefault()

          const content = this.inputTarget.value.trim()
          if (!content || !this.subscription) return

          this.subscription.send({
            sender_email: this.currentEmail,
            receiver_email: this.peerEmail,
            content,
          })

          this.inputTarget.value = ""
        }

        toggleComposer(disabled) {
          this.inputTarget.disabled = disabled
          this.sendButtonTarget.disabled = disabled
        }

        mergeMessages(currentMessages, incomingMessages) {
          const messagesByKey = new Map()

          currentMessages.forEach((message) => {
            messagesByKey.set(this.messageKey(message), this.normalizeMessage(message))
          })

          incomingMessages.forEach((message) => {
            const normalized = this.normalizeMessage(message)
            messagesByKey.set(this.messageKey(normalized), normalized)
          })

          return Array.from(messagesByKey.values()).sort((first, second) => {
            return new Date(first.created_at).getTime() - new Date(second.created_at).getTime()
          })
        }

        normalizeMessage(message) {
          return {
            id: message.id,
            content: message.content,
            created_at: message.created_at,
            sender_email: message.sender?.email || message.sender_email,
            receiver_email: message.receiver?.email || message.receiver_email,
          }
        }

        messageKey(message) {
          return (
            message.id ||
            [
              message.sender_email,
              message.receiver_email,
              message.content,
              message.created_at,
            ].join("-")
          )
        }

        renderMessages() {
          if (this.messages.length === 0) {
            this.messagesTarget.innerHTML = `
              <div class="flex h-full min-h-80 items-center justify-center">
                <p class="rounded-full border border-dashed border-slate-300 px-6 py-3 text-sm text-slate-400">
                  Nenhuma mensagem ainda.
                </p>
              </div>
            `
            return
          }

          this.messagesTarget.innerHTML = this.messages
            .map((message) => {
              const own = message.sender_email === this.currentEmail
              const rowClasses = own ? "justify-end" : "justify-start"
              const bubbleClasses = own
                ? "bg-chat-accent text-white shadow-blue-200/70"
                : "border border-slate-200 bg-white text-slate-900 shadow-slate-200/70"
              const timeClasses = own ? "text-blue-100" : "text-slate-400"
              const authorMarkup = own
                ? ""
                : `<p class="mb-1 text-[11px] font-medium uppercase tracking-[0.18em] text-slate-400">${this.escapeHtml(message.sender_email)}</p>`

              return `
                <article class="mb-3 flex ${rowClasses}">
                  <div class="max-w-[85%] rounded-[1.4rem] px-4 py-3 shadow-lg sm:max-w-[70%] ${bubbleClasses}">
                    ${authorMarkup}
                    <p class="whitespace-pre-wrap break-words text-sm leading-6">${this.escapeHtml(message.content)}</p>
                    <time class="mt-2 block text-right text-[11px] ${timeClasses}">${this.formatTime(message.created_at)}</time>
                  </div>
                </article>
              `
            })
            .join("")

          this.messagesTarget.scrollTop = this.messagesTarget.scrollHeight
        }

        updateHistoryStatus() {
          this.historyStatusTarget.textContent = `${this.messages.length} mensagens carregadas`
        }

        formatTime(timestamp) {
          if (!timestamp) return ""

          return new Intl.DateTimeFormat("pt-BR", {
            dateStyle: "short",
            timeStyle: "short",
          }).format(new Date(timestamp))
        }

        escapeHtml(value) {
          return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;")
        }

        get currentEmail() {
          return this.emailSelectTarget.value
        }

        get peerEmail() {
          const selectedOption = this.emailSelectTarget.selectedOptions[0]
          return selectedOption.dataset.peer
        }
      }

      const application = Application.start()
      application.register("chat", ChatController)
    </script>
  </body>
</html>
